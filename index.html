<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>莫萱｜数字化运营作品集</title><style>body{margin:0;background:#f6f0ea;color:#2e2327;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;display:grid;place-items:center;min-height:100vh}.loading{letter-spacing:.16em;color:#a53260}</style></head><body><div class="loading">作品集正在载入…</div><script>(async()=>{try{const n=49,a=await Promise.all(Array.from({length:n},(_,i)=>fetch('parts/p'+String(i+1).padStart(3,'0')+'.txt').then(r=>{if(!r.ok)throw Error(r.status);return r.text()}))),s=atob(a.join('')),u=Uint8Array.from(s,c=>c.charCodeAt(0)),j=JSON.parse(await new Response(new Blob([u]).stream().pipeThrough(new DecompressionStream('gzip'))).text());let h=j.html;for(const [f,v] of Object.entries(j.assets))h=h.split('/'+f).join('data:'+v.mime+';base64,'+v.data);document.open();document.write(h);document.close()}catch(e){document.body.innerHTML='<p>页面载入失败，请刷新重试。</p>'}})();</script></body></html>
